<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>LyriSwap — AI Song Translation</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/><style>body{font-family:'Inter',sans-serif;}</style></head><body class="bg-gray-950 text-white min-h-screen"><nav class="border-b border-gray-800 px-6 py-4 flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-8 h-8 bg-pink-600 rounded-lg flex items-center justify-center">🎵</div><span class="font-bold text-xl">LyriSwap</span><span class="text-xs bg-pink-900/50 text-pink-300 px-2 py-0.5 rounded ml-1">Private Beta</span></div><div class="flex gap-2"><button onclick="showTab('swap')" class="tab-btn px-3 py-2 rounded-lg text-sm bg-pink-600 text-white" data-tab="swap">Swap Lyrics</button><button onclick="showTab('history')" class="tab-btn px-3 py-2 rounded-lg text-sm text-gray-400" data-tab="history">History</button></div></nav><div id="tab-swap" class="p-6 max-w-5xl mx-auto"><h1 class="text-3xl font-black mb-2">Translate songs. Keep the vibe. 🎶</h1><p class="text-gray-400 mb-6">AI translates lyrics preserving rhythm, rhyme, and flow.</p><div class="grid grid-cols-2 gap-6"><div class="space-y-3 bg-gray-900 border border-gray-800 rounded-xl p-5"><input id="song-name" type="text" placeholder="Song name" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"/><input id="song-artist" type="text" placeholder="Artist" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"/><div class="grid grid-cols-2 gap-2"><select id="lang-from" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"><option>English</option><option>Italian</option><option>Spanish</option><option>French</option></select><select id="lang-to" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"><option>Italian</option><option>English</option><option>Spanish</option><option>French</option></select></div><select id="song-genre" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"><option>Pop</option><option>Hip-Hop</option><option>Rock</option><option>R&B</option><option>Ballad</option></select><textarea id="lyrics-input" rows="10" placeholder="Paste original lyrics here..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:border-pink-500"></textarea><button onclick="swapLyrics()" class="w-full bg-pink-600 hover:bg-pink-700 py-3 rounded-xl font-bold">🎵 Swap Lyrics</button></div><div class="bg-gray-900 border border-gray-800 rounded-xl p-5"><div class="flex justify-between mb-3"><h3 class="font-semibold">Translated Lyrics</h3><button onclick="navigator.clipboard.writeText(document.getElementById('lyrics-output').innerText)" class="text-xs text-pink-400">📋 Copy</button></div><div id="lyrics-output" class="text-sm text-gray-300 min-h-64"><p class="text-gray-500">Translated lyrics will appear here...</p></div></div></div></div><div id="tab-history" class="p-6 hidden max-w-2xl"><h1 class="text-2xl font-bold mb-4">Your Swaps 🎶</h1><div id="swaps-list" class="space-y-3"></div></div><script>const SUPABASE_URL='https://nmulrsbqdeqokvrybapn.supabase.co';const SUPABASE_KEY='%%SUPABASE_ANON_KEY%%';const GROQ_KEY='%%GROQ_KEY%%';const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);function showTab(tab){document.querySelectorAll('[id^="tab-"]').forEach(el=>el.classList.add('hidden'));document.getElementById('tab-'+tab).classList.remove('hidden');document.querySelectorAll('.tab-btn').forEach(btn=>{btn.classList.remove('bg-pink-600','text-white');btn.classList.add('text-gray-400');});const a=document.querySelector(`[data-tab="${tab}"]`);a.classList.add('bg-pink-600','text-white');a.classList.remove('text-gray-400');if(tab==='history')loadHistory();}async function swapLyrics(){const song=document.getElementById('song-name').value,artist=document.getElementById('song-artist').value,from=document.getElementById('lang-from').value,to=document.getElementById('lang-to').value,genre=document.getElementById('song-genre').value,lyrics=document.getElementById('lyrics-input').value,el=document.getElementById('lyrics-output');if(!lyrics.trim()){el.innerHTML='<p class="text-red-400">Paste lyrics first!</p>';return;}el.innerHTML='<p class="text-pink-400 animate-pulse">🎵 Translating with rhythm preservation...</p>';const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${GROQ_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:`Translate these ${from} lyrics to ${to} for "${song}" by ${artist} (${genre}). RULES: preserve syllable count per line, maintain rhyme scheme, keep emotional meaning, make it singable. Provide ONLY the translated lyrics.\n\n${lyrics}`}],max_tokens:1000})});const data=await res.json();const translated=data.choices[0].message.content;el.innerHTML=`<pre class="whitespace-pre-wrap font-sans text-gray-200">${translated}</pre>`;await sb.from('ls_swaps').insert([{song_name:song,artist,from_lang:from,to_lang:to,genre,translated_lyrics:translated}]);}async function loadHistory(){const{data}=await sb.from('ls_swaps').select('*').order('created_at',{ascending:false}).limit(20);document.getElementById('swaps-list').innerHTML=(data||[]).map(s=>`<div class="bg-gray-900 border border-gray-800 rounded-xl p-4"><p class="font-bold">${s.song_name||'Unknown'}</p><p class="text-sm text-gray-400">${s.artist||''} · ${s.from_lang} → ${s.to_lang}</p></div>`).join('')||'<p class="text-gray-500">No swaps yet.</p>';}</script></body></html>
